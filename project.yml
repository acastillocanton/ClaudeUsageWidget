name: ClaudeUsageWidget
options:
  bundleIdPrefix: com.alejandro.claudeusage
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.3"

settings:
  base:
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 36773FPNUM
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ClaudeUsageWidget:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsageWidget
        excludes:
          - "*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alejandro.claudeusage.widget
        INFOPLIST_FILE: ClaudeUsageWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageWidget/ClaudeUsageWidget.entitlements
    dependencies:
      - target: UsageWidgetExtension

  UsageWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: UsageWidgetExtension
        excludes:
          - "*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alejandro.claudeusage.widget.extension
        INFOPLIST_FILE: UsageWidgetExtension/Info.plist
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks @executable_path/../../../../Frameworks"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: UsageWidgetExtension/UsageWidgetExtension.entitlements
